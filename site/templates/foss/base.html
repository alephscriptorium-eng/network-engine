<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ brand }} — Artefacto{% endblock %}</title>
  <script>
    (function(){try{var t=localStorage.getItem('ne-theme');document.documentElement.setAttribute('data-theme',t||'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
  </script>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="index.html" class="brand">{{ brand }}</a>
      <p class="tag">Artefacto · v{{ version }}</p>
      <nav aria-label="Documentación FOSS">
        <a href="index.html">Índice</a>
        <a href="tecnico.html">Técnico</a>
        <a href="funcional.html">Funcional</a>
        <a href="datos-publicados.html">Datos publicados</a>
        <a href="devops.html">DevOps</a>
        <a href="LICENSE.html">Licencia</a>
        <hr>
        <a href="../prensa/index.html" class="nav-external">Centro de datos ↗</a>
      </nav>
      <div class="sidebar-footer">
        <button type="button" id="theme-toggle" class="theme-toggle">Modo claro</button>
      </div>
    </aside>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="assets/theme.js"></script>
</body>
</html>
