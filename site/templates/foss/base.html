<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ brand.producto.nombre }} — Artefacto{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ meta_description }}{% endblock %}">
  <script>
    (function(){try{var t=localStorage.getItem('ne-theme');document.documentElement.setAttribute('data-theme',t||'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
  </script>
  {% include "head-meta.html" %}
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/components.css">
</head>
<body>
  <a class="skip-link" href="#main">Saltar al contenido</a>
  <div class="layout">
    <aside class="sidebar">
      {% include "foss-sidebar.html" %}
    </aside>
    <main id="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="assets/theme.js"></script>
</body>
</html>
